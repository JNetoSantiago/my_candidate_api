pre-commit:
  parallel: true
  commands:
    rubocop:
      tags: backend style
      glob: "*.rb"
      exclude: "application.rb|routes.rb|schema.rb|boot.rb"
      run: bundle exec rubocop -A --force-exclusion {staged_files}
pre-push:
  parallel: true
  commands:
    rubocop:
      tags: backend style
      glob: "*.rb"
      exclude: "application.rb|routes.rb|schema.rb|boot.rb"
      run: bundle exec rubocop -A --force-exclusion {staged_files}
    tests:
      tags: backend test
      run: bundle exec rails test
