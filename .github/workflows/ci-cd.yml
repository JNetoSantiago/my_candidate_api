name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: RSpec & RuboCop
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports: ['5432:5432']
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: app_test
        options: >-
          --health-cmd="pg_isready -U postgres" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5

      redis:
        image: redis:7
        ports: ['6379:6379']

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/app_test
      REDIS_URL: redis://localhost:6379/1

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Ruby e Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.3'
          bundler-cache: true

      - name: Instalar dependências do sistema
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libvips

      - name: Criar banco de dados
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Rodar RuboCop
        run: bundle exec rubocop

      - name: Rodar RSpec
        run: bundle exec rspec
  
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configurar acesso ao cluster
        run: doctl kubernetes cluster kubeconfig save my-candidate

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3

      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my_candidate:latest

      - name: Aplicar manifests no cluster
        run: |
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/db-secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
  
